version: "3.9"

services:
  # ── Node.js backend ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Build only the "production" stage (skips devDeps / tests in final image)
      target: production
    image: multi-stage-node-app:latest
    container_name: node_app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    # app is not exposed directly to the host; traffic goes through Nginx
    expose:
      - "3000"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Nginx reverse proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"         # HTTP — change to "443:443" for TLS
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
